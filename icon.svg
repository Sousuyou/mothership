<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <!-- 紙の背景（ラボラトリー紙テーマ） -->
  <rect width="1024" height="1024" fill="#fbfaf6"/>
  <!-- 外枠（墨色・直角） -->
  <rect x="60" y="60" width="904" height="904" fill="none" stroke="#242424" stroke-width="12"/>
  <!-- 内枠（アクセントグリーン） -->
  <rect x="96" y="96" width="832" height="832" fill="none" stroke="#3f6b54" stroke-width="6"/>
  <!-- 母（明朝体・墨色） -->
  <text x="480" y="650" font-family="Hiragino Mincho ProN, YuMincho, serif" font-size="540" font-weight="600" fill="#242424" text-anchor="middle">母</text>
  <!-- 緑の印（朱印風・艦） -->
  <rect x="688" y="688" width="180" height="180" fill="#3f6b54"/>
  <text x="778" y="822" font-family="Hiragino Mincho ProN, YuMincho, serif" font-size="130" fill="#fbfaf6" text-anchor="middle">艦</text>
</svg>
