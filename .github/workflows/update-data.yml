name: データ自動更新

on:
  schedule:
    - cron: "0 */6 * * *"   # 6時間ごと（0時・6時・12時・18時 UTC）
  workflow_dispatch:          # GitHub 画面から手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: カクテル・ジンニュース収集
        run: python scripts/collect_articles.py

      - name: はてなブックマーク IT 収集
        run: python scripts/collect_hatena.py

      - name: Claude Code 記事収集（Zenn・Qiita）
        run: python scripts/collect_claude.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ scripts/.translation_cache.json || true
          git diff --staged --quiet || git commit -m "データ自動更新 $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push
